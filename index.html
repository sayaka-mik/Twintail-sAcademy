<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 트윈테일 alphe-0.12-</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; background-color: #222; display: flex; 
            justify-content: center; align-items: center; height: 100vh;
            font-family: 'Malgun Gothic', sans-serif; overflow: hidden;
        }
        #app {
            width: 100%; max-width: 450px; aspect-ratio: 3 / 5; /* 모바일에 맞춘 세로형 */
            background-color: #fff; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* 화면 전환용 클래스 */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; background: #fff; z-index: 10;
        }
        .hidden { display: none !important; }

        /* 타이틀 & 인터미션 화면 */
        .center-screen {
            justify-content: center; align-items: center; text-align: center; background: #2d3436; color: white;
        }
        .title { font-size: 28px; font-weight: bold; margin-bottom: 10px; color: #f1c40f; }
        .subtitle { font-size: 14px; margin-bottom: 40px; color: #bdc3c7; }
        .btn-large {
            padding: 15px 40px; font-size: 18px; font-weight: bold; color: #222;
            background: #f1c40f; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px #d4ac0d; transition: transform 0.1s;
        }
        .btn-large:active { transform: translateY(4px); box-shadow: 0 0 #d4ac0d; }

        /* 게임 화면 HUD */
        #hud {
            height: 60px; background: #333; color: white;
            display: flex; flex-direction: row; justify-content: space-between; align-items: center;
            padding: 0 20px; font-size: 14px; font-weight: bold;
        }

        /* 10x10 게임 뷰포트 (중상단 배치) */
        #viewport-container {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: #87CEEB; transition: background-color 2.0s ease; gap: 10px;
        }
        #game-board {
            width: 350px; height: 350px; background: #e0e0e0; position: relative;
            display: grid; border: 4px solid #222;
            grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr);
        }
        
        .tile {
            border: 0.1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: center; align-items: center; 
            font-size: 10px; font-weight: bold; color: gold; text-align: center; line-height: 1.1;
        }
        .tile-empty { background-color: #f0f0f0; } 
        .tile-mountain { background-color: #cd6133; } 
        .tile-river { background-color: #7ed6df; } 
        .tile-forest { background-color: #badc58; } 
        .tile-road { background-color: #f0f0f0; } 
        .tile-building { background-color: #7f8c8d; }
        .tile-out { background-color: #000; }

        .char { position: absolute; font-size: 24px; z-index: 20; transition: all 0.15s linear; }

        #character-status {
            width: 350px; background: rgba(30, 30, 30, 0.85); color: white; 
            padding: 12px; border-radius: 8px; font-size: 13px; 
            border: 2px solid #222; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        /* 하단 컨트롤 버튼 영역 */
        #controls {
            height: 90px; background: #eee; display: flex; justify-content: space-around; align-items: center;
            padding: 0 10px; border-top: 2px solid #ccc;
        }
        .btn-control {
            flex: 1; margin: 0 5px; padding: 15px 0; font-size: 14px; font-weight: bold;
            background: #57606f; color: white; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px #2f3542;
        }
        .btn-control:active { transform: translateY(2px); box-shadow: 0 2px #2f3542; }
        .btn-pause.paused { background: #e1b12c; box-shadow: 0 4px #b38b22; color: #222; }

        /* 모달 팝업 (일시정지 & 지도) */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-box {
            background: white; padding: 20px; border-radius: 12px; width: 85%;
            text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .btn-close {
            margin-top: 15px; padding: 10px 20px; background: #e74c3c; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        
        /* 미니맵 캔버스 */
        #minimap-canvas {
            background: #000; border: 2px solid #333; max-width: 100%; image-rendering: pixelated;

            /* CSS에 추가 */
        .dropped-food { position: absolute; font-size: 8px; bottom: 1px; right: 1px; }

        }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-start" class="screen center-screen">
        <div class="title">아포칼립스 샌드박스</div>
        <div class="subtitle">오늘의트윈테일.alpha.0.12.마인드.특성.</div>
        <button class="btn-large" onclick="changeScreen('screen-intermission')">게임 준비</button>
    </div>

    <div id="screen-intermission" class="screen center-screen hidden">
        <div class="title">세계 생성 중...</div>
        <div class="subtitle">새로운 80x80 지형을 구축합니다.</div>
        <button class="btn-large" onclick="startSimulation()">시뮬레이션 시작</button>
    </div>

    <div id="screen-game" class="screen hidden">
        <div id="hud">
            <div>Day <span id="hud-day" style="color: #4bcffa;">1</span></div>
            <div>진행 턴: <span id="hud-turn" style="color: #f1c40f;">0</span></div>
            <div><span id="hud-time" style="color: #badc58;">06:00</span></div>
        </div>
<div id="viewport-container">
            <div id="game-board"></div>
            <div id="character-status">
                <div id="status-title" style="font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #f1c40f;">🥰 트윈테일 [상태: 대기]</div>
                <div class="stat-grid">
                    <span>❤️ HP: <span id="stat-hp">50</span>/50</span>
                    <span>⚔️ 공격: <span id="stat-atk">1</span></span>
                    <span>🍖 허기: <span id="stat-hunger">0</span></span>
                    <span>💧 갈증: <span id="stat-thirst">0</span></span>
                    <span>💤 피로: <span id="stat-fatigue">0</span></span>
                    <span>🎒 가방슬롯: <span id="stat-bag">0</span>/4</span>
                </div>
            </div>
        </div> <div id="controls">
            <button class="btn-control" onclick="goHome()">처음으로</button>
            <button id="btn-pause" class="btn-control btn-pause" onclick="togglePause()">일시정지</button>
            <button class="btn-control" onclick="showMap()">전체 지도</button>
        </div>

<div id="modal-pause" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title">🧠 마인드 체크</div>
            
            <div style="font-size: 14px; margin-bottom: 15px;">
                현재 <strong id="popup-turn" style="color:#e1b12c; font-size: 18px;">0</strong> 턴 진행되었습니다.
            </div>
            
            <div id="modal-trait-box" style="background: #eef2f3; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: left; border: 1px dashed #7f8c8d; font-size: 13px;">
                </div>

            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; border: 1px solid #ddd;">
                <div style="font-weight: bold; margin-bottom: 8px; color: #2d3436; border-bottom: 1px solid #ccc; padding-bottom: 5px;">[내면 상태]</div>
                <div id="mental-stats-area" style="font-size: 14px; color: #333; display: flex; flex-direction: column; gap: 5px;">
                    <div>🔥 용기: <strong id="stat-courage" style="color: #e74c3c;">50</strong></div>
                </div>
            </div>

            <button class="btn-close" onclick="closePausePopup()">닫기</button>
        </div>
    </div>

    <div id="modal-map" class="modal-overlay hidden">
        <div class="modal-box" style="padding: 10px;">
            <div class="modal-title" style="margin-bottom: 5px;">전체 위성 지도</div>
            <canvas id="minimap-canvas" width="280" height="280"></canvas>
            <div><button class="btn-close" onclick="closeMap()">지도 닫기</button></div>
        </div>
    </div>
<script>
    const MAP_SIZE = 70;
    const VIEW_SIZE = 10;
    const TURN_DELAY = 400; // 0.4초 1턴

    let mapGrid = [];
    let camera = { x: 0, y: 0 };
    
    let turnCount = 0;
    let gameTimer = null;
    let enemyTimer = null; // [추가] 적 전용 타이머
    let isPaused = false;
    let enemies = []; // [추가] 맵에 존재하는 적 목록

    // [추가] 건물별 자원 설정 (하드코딩 방지용 Config)
    const BUILDING_RESOURCES = {
        '아파트': { food: [7, 9], sleep: 2 },
        '상점': { food: [3, 9], sleep: 1 },
        '대형마트': { food: [11, 20], sleep: 1 },
        '교회': { food: [0, 5], sleep: 2 },
        '주택': { food: [5, 7], sleep: 1 },
        '학교': { food: [3, 15], sleep: 1 }
    };

// [추가] 특성 목록 정의 (기능은 아직 비워둠)
    const TRAIT_DATABASE = [
        { id: 'pretty_girl', name: '미소녀', description: '미소녀임' },
        { id: 'twintail', name: '트윈테일', description: '트윈테일임' }
    ];

    // [수정] 캐릭터 스탯 팩토리 (심리 스탯 및 특성 칸 추가)
    function createEntityStats(hp, atk, maxWeight) {
        return {
            hp: hp, maxHp: hp, atk: atk,
            hunger: 0, maxHunger: 100,
            thirst: 0, maxThirst: 100, 
            fatigue: 0, maxFatigue: 100,
            weightLimit: maxWeight,
            inventory: { food: 0, water: 0 }, 
            movesInInterval: 0,
            currentState: 'IDLE',
            actionTimer: 0,
            sleepDuration: 0,
            
            // --- [내면 스탯 영역] ---
            courage: 50, // 용기
            love: 50,    // 사랑 (아직 안짬)
            anger: 0,    // 분노 (아직 안짬)
            
            // --- [특성 영역] ---
            traits: [] // 부여받은 특성 객체들이 담길 곳
        };
    }

    // [추가] 심리 상태에 따른 행동 변화 로직 (아직 안짬 - 공간만 확보)
    function applyMentalInfluences(character) {
        let st = character.stats;
        // 예: 용기가 낮으면 도망 우선순위 상승 등... (추후 구현 예정)
    }

    // 프리팹 정의
    const PREFABS = {
        '아파트': [[0,0], [1,0], [0,1], [1,1]], 
        '상점': [[0,0], [1,0], [0,1]], 
        '대형마트': [[0,0], [1,0], [2,0], [0,1], [1,1], [2,1]], 
        '교회': [[0,0], [0,1], [1,1], [0,2], [1,2], [2,2]],
        '주택': [[0,0], [1,0]], 
    };
// [수정] 3x3 블록 3개가 합쳐진 진짜 'ㄴ' 자 형태의 학교 (27칸)
    let schoolPrefab = [];
    for(let x=0; x<3; x++) for(let y=0; y<3; y++) schoolPrefab.push([x, y]); // 상단 블록
    for(let x=0; x<3; x++) for(let y=3; y<6; y++) schoolPrefab.push([x, y]); // 코너(모서리) 블록
    for(let x=3; x<6; x++) for(let y=3; y<6; y++) schoolPrefab.push([x, y]); // 우측 블록
    PREFABS['학교'] = schoolPrefab;

    // --- UI 및 상태 제어 ---
    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    function goHome() {
        stopTimer();
        changeScreen('screen-start');
    }

function startSimulation() {
        changeScreen('screen-game');
        turnCount = 0;
        isPaused = false;
        document.getElementById('btn-pause').innerText = "일시정지";
        document.getElementById('btn-pause').classList.remove('paused');
        
        enemies = []; 
        character.stats = createEntityStats(50, 1, 4); 
        character.emoji = '🥰';

        // [추가] 랜덤 특성 부여 (시작 시 리셋 효과)
        let randomTrait = TRAIT_DATABASE[Math.floor(Math.random() * TRAIT_DATABASE.length)];
        character.stats.traits.push(randomTrait);

        initDisplay();
        generateMap();
        spawnCharacter();
        
        startTimer();
        render();
    }

// [수정] 타이머 시작/정지 함수 분리
    function startTimer() {
        if(gameTimer) clearInterval(gameTimer);
        gameTimer = setInterval(gameTick, TURN_DELAY); // 400ms (캐릭터/시간)

        if(enemyTimer) clearInterval(enemyTimer);
        enemyTimer = setInterval(enemyTick, 370); // 370ms (적군 이동)
    }

    function stopTimer() {
        if(gameTimer) { clearInterval(gameTimer); gameTimer = null; }
        if(enemyTimer) { clearInterval(enemyTimer); enemyTimer = null; }
    }

    function togglePause() {
        isPaused = !isPaused;
        const btn = document.getElementById('btn-pause');
        if (isPaused) {
            stopTimer();
            btn.innerText = "이어서 시작";
            btn.classList.add('paused');
            
            document.getElementById('popup-turn').innerText = turnCount;
            document.getElementById('stat-courage').innerText = character.stats.courage;
            
            // [추가] 특성 상세 내용 팝업에 출력
            let traitHtml = '';
            character.stats.traits.forEach(t => {
                traitHtml += `<div><strong>[특성] ${t.name}</strong> : ${t.description}</div>`;
            });
            document.getElementById('modal-trait-box').innerHTML = traitHtml || '보유 특성 없음';
            
            document.getElementById('modal-pause').classList.remove('hidden');
        } else {
            startTimer();
            btn.innerText = "일시정지";
            btn.classList.remove('paused');
            document.getElementById('modal-pause').classList.add('hidden');
        }
    }

    function closePausePopup() {
        // 팝업만 닫고 일시정지 상태는 유지
        document.getElementById('modal-pause').classList.add('hidden');
    }

// --- 미니맵 캔버스 렌더링 ---
    function showMap() {
        document.getElementById('modal-map').classList.remove('hidden');
        const canvas = document.getElementById('minimap-canvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 4; 
        
        // [수정] 맵 사이즈(70)에 맞춰 캔버스 크기를 동적으로 조절합니다.
        canvas.width = MAP_SIZE * tileSize;
        canvas.height = MAP_SIZE * tileSize;

        // 색상 매핑
        const colors = {
            'empty': '#f0f0f0', 'mountain': '#cd6133', 'river': '#7ed6df',
            'forest': '#badc58', 'road': '#576574', 'building': '#7f8c8d'
        };

        for (let y = 0; y < MAP_SIZE; y++) {
            for (let x = 0; x < MAP_SIZE; x++) {
                ctx.fillStyle = colors[mapGrid[y][x].type] || '#000';
                ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }
        
        // [추가] 맵에 존재하는 적들을 빨간색 점으로 렌더링
        ctx.fillStyle = '#e74c3c'; // 붉은색
        enemies.forEach(en => {
            ctx.beginPath();
            ctx.arc(en.x * tileSize + 2, en.y * tileSize + 2, 3, 0, Math.PI*2);
            ctx.fill();
        });

        // 캐릭터 위치 (노란색)
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(character.x * tileSize + 2, character.y * tileSize + 2, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
    }
    
    function closeMap() {
        document.getElementById('modal-map').classList.add('hidden');
    }

// [수정] 메인 게임 틱 (400ms)
    function gameTick() {
turnCount++;
        updateDayNightCycle(); 
        
        executeCharacterAI(); // <--- 변경됨!
        
        updateCamera();
        updateStatus(); 
        spawnEnemiesAtNight(); 
        updateStatusUI(); 
        render();
    }

// [수정] 2시간(10턴) 주기 스탯 증감 엔진
    function updateStatus() {
        if (turnCount % 10 === 0 && turnCount > 0) {
            let st = character.stats;
            
            // [추가] 갈증은 이동 여부와 무관하게 10턴마다 4 상승
            st.thirst = Math.min(st.maxThirst, st.thirst + 4);

            if (st.movesInInterval > 5) {
                // 가방 안의 총 아이템 개수 계산
                let totalItems = st.inventory.food + st.inventory.water;
                
                let hungerGain = 4 + (totalItems >= 2 ? 1 : 0);
                st.hunger = Math.min(st.maxHunger, st.hunger + hungerGain);
                
                let fatigueGain = 5 + (totalItems >= 2 ? 1 : 0);
                st.fatigue = Math.min(st.maxFatigue, st.fatigue + fatigueGain);
            }
            
            if (st.hunger >= 90) st.hp -= 1;
            if (st.fatigue >= 90) st.hp -= 2;
            if (st.hp < 0) st.hp = 0; 

            st.movesInInterval = 0;
        }
    }

    // [추가] 매일 밤(90턴) 적 스폰 로직
    function spawnEnemiesAtNight() {
        // 1일 120턴 중 밤이 시작되는 90번째 턴
        if (turnCount % 120 === 90) {
            let validMountains = [];
            for(let y=0; y<MAP_SIZE; y++) {
                for(let x=0; x<MAP_SIZE; x++) {
                    if(mapGrid[y][x].type === 'mountain') {
                        // 캐릭터와 맨해튼 거리 기준 2청크(20칸) 이상 떨어진 산만 추출
                        let dist = Math.abs(x - character.x) + Math.abs(y - character.y);
                        if(dist >= 20) validMountains.push({x, y});
                    }
                }
            }
            
            // 2마리 스폰
            for(let i=0; i<2; i++) {
                if(validMountains.length > 0) {
                    let randIdx = Math.floor(Math.random() * validMountains.length);
                    let pos = validMountains[randIdx];
                    enemies.push({ x: pos.x, y: pos.y, hp: 20, atk: 2, vision: 7 });
                }
            }
        }
    }

    function updateDayNightCycle() {
        // 120턴 = 1일
        let day = Math.floor(turnCount / 120) + 1;
        let turnInDay = turnCount % 120; // 0 ~ 119
        
        // 시각 계산: 120턴이 24시간이므로 5턴당 1시간. 아침 6시(0턴) 시작.
        let hour = 6 + Math.floor(turnInDay / 5);
        if (hour >= 24) hour -= 24;
        
        // 요구사항: 2시간 단위로만 표시 (짝수 시간으로 내림)
        let displayHour = Math.floor(hour / 2) * 2;
        let timeStr = `${displayHour.toString().padStart(2, '0')}:00`;

        // 배경색 결정 (4단계)
        let bgColor = "#87CEEB"; // 오전 (기본 하늘색)
        if (turnInDay >= 90) { 
            bgColor = "#2c3e50"; // 밤 (어두운 남색)
        } else if (turnInDay >= 60) { 
            bgColor = "#e67e22"; // 저녁 (노을빛)
        } else if (turnInDay >= 30) { 
            bgColor = "#f1c40f"; // 오후 (밝은 햇빛)
        }

        // UI 갱신
        document.getElementById('hud-day').innerText = day;
        document.getElementById('hud-turn').innerText = turnCount;
        document.getElementById('hud-time').innerText = timeStr;
        document.getElementById('viewport-container').style.backgroundColor = bgColor;
    }

// [수정] 행위 선택기 (수면 회복량 버프 및 사망 체크 추가)
// [수정] 행동 선택 AI (물 마시기, 파밍 우선순위 조정)
    function executeCharacterAI() {
        let st = character.stats;
        if (st.hp <= 0) return;

        // [추가] 갈증 90 이상이면 '매 턴(400ms)'마다 HP 1씩 깎임
        if (st.thirst >= 90) {
            st.hp -= 1;
            if (st.hp <= 0) return; // 깎여서 사망 시 이번 턴 행동 중지
        }

        if (st.actionTimer > 0) {
            st.actionTimer--;
            if (st.actionTimer === 0) {
                if (st.currentState === 'SLEEPING_IN') { st.hunger += 1; st.fatigue = Math.max(0, st.fatigue - 15); st.sleepDuration += 10; }
                if (st.currentState === 'SLEEPING_OUT') { st.hunger += 1; st.fatigue = Math.max(0, st.fatigue - 10); st.sleepDuration += 10; }
                if (st.currentState === 'RESTING') { st.hunger += 1; st.fatigue = Math.max(0, st.fatigue - 5); }
                
                if ((st.currentState === 'SLEEPING_IN' || st.currentState === 'SLEEPING_OUT') && st.sleepDuration < 70) {
                    let enemyVisible = enemies.some(en => Math.abs(en.x - character.x) + Math.abs(en.y - character.y) <= 3); 
                    // [수정] 목마르면 잠에서 깨도록 조건 추가
                    if (!enemyVisible && st.hunger < 90 && st.thirst < 90) { 
                        st.actionTimer = 10; return;
                    }
                }
                st.currentState = 'IDLE';
                st.sleepDuration = 0;
            }
            return;
        }

        let candidates = [];
        let enemyVisible = enemies.some(en => Math.abs(en.x - character.x) + Math.abs(en.y - character.y) <= 7);

        // [행동 우선순위 풀]
        // 💡 팁: '식량 버리기' 나 '물 버리기'가 들어간 이유는 가방이 꽉 찼을 때 파밍을 시도하기 위함입니다!
        if (enemyVisible) { candidates = ['도망치기', '공격']; } 
        else if (st.thirst > 90) { candidates = ['물마시기', '강 찾기', '식량 버리기', '물파밍', '노상수면', '대기']; } 
        else if (st.hunger > 90) { candidates = ['식사', '건물 찾기', '물 버리기', '식량파밍', '노상수면', '대기']; } 
        else if (st.thirst > 50) { candidates = ['물마시기', '강 찾기', '식량 버리기', '물파밍', '대기']; } 
        else if (st.hunger > 50) { candidates = ['식사', '건물 찾기', '물 버리기', '식량파밍', '대기']; } 
        else if (st.hunger <= 10 && st.thirst <= 10) { candidates = ['식량 버리기', '물 버리기', '돌아다니기', '대기']; } 
        else if (st.fatigue > 50) { candidates = ['건물 찾기', '수면', '노상수면']; } 
        else if (st.fatigue <= 50) { candidates = ['휴식', '돌아다니기', '대기']; } 
        else { candidates = ['돌아다니기', '대기']; } 

// 3. 조건이 맞는 가장 앞의 행위 실행
        for (let actName of candidates) {
            if (ACTIONS[actName] && ACTIONS[actName].canExecute()) {
                // [버그 픽스] 행동을 시도해보고, false가 떨어지면 포기하고 다음 우선순위 행동을 찾음
                let success = ACTIONS[actName].execute(); 
                if (success !== false) {
                    return; // 행동을 무사히 마쳤으면 턴 종료
                }
            }
        }
        
        // 위에서 뭘 하려다 다 실패했거나 할 게 없으면 무조건 돌아다님
        ACTIONS['돌아다니기'].execute();
    }

    function updateCamera() {
        // 카메라를 캐릭터 중앙에 맞추되, 맵 경계를 벗어나지 않도록 보정
        let half = Math.floor(VIEW_SIZE / 2);
        camera.x = Math.max(0, Math.min(MAP_SIZE - VIEW_SIZE, character.x - half));
        camera.y = Math.max(0, Math.min(MAP_SIZE - VIEW_SIZE, character.y - half));
    }

    // --- 맵 생성 및 렌더링 로직 (이전 버전 이식) ---
    function initDisplay() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        for (let y = 0; y < VIEW_SIZE; y++) {
            for (let x = 0; x < VIEW_SIZE; x++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${x}-${y}`;
                board.appendChild(tile);
            }
        }
    }

    function generateMap() {
        mapGrid = Array.from(Array(MAP_SIZE), () => Array(MAP_SIZE).fill({ type: 'empty', name: '' }));
        
        generateBlobs('mountain', 4, 150);
        generateRiver();
        generateRoads(40, 40, 5); 
        generateBuildings();
        generateBlobs('forest', 20, 40);
    }

    function spawnCharacter() {
        // 랜덤으로 빈 땅이나 길 찾기
        while(true) {
            let rx = Math.floor(Math.random() * MAP_SIZE);
            let ry = Math.floor(Math.random() * MAP_SIZE);
            let type = mapGrid[ry][rx].type;
            if (type === 'empty' || type === 'road') {
                character.x = rx;
                character.y = ry;
                updateCamera();
                break;
            }
        }
    }

    let character = { x: 0, y: 0, emoji: '🥰', stats: createEntityStats(50, 1, 4) };

// [추가 및 수정] 행위 목록 사전
    const ACTIONS = {
        // ... (돌아다니기, 건물 찾기 등 기존 내용 유지) ...
        '돌아다니기': {
            canExecute: () => true,
            execute: () => {
                let dirs = [[0,1], [0,-1], [1,0], [-1,0]].sort(() => Math.random() - 0.5); 
                for (let d of dirs) {
                    let nx = character.x + d[0], ny = character.y + d[1];
                    let type = getTile(nx, ny).type;
                    if (type !== 'mountain' && type !== 'river' && type !== 'out') {
                        character.x = nx; character.y = ny;
                        character.stats.movesInInterval++; break;
                    }
                }
            }
        },
// [수정] 건물을 찾지 못하면 false를 반환하여 다른 행동을 유도함
        '건물 찾기': {
            canExecute: () => getTile(character.x, character.y).type !== 'building',
            execute: () => {
                let next = getNextStepBFS(character.x, character.y, null, null, 'building');
                if (next) { 
                    character.x = next.x; character.y = next.y; 
                    character.stats.movesInInterval++; 
                    return true; 
                }
                return false; // 실패!
            }
        },
        // [수정] 강을 찾지 못하면 false를 반환
        '강 찾기': {
            canExecute: () => ![[0,1],[0,-1],[1,0],[-1,0]].some(d => getTile(character.x+d[0], character.y+d[1]).type === 'river'),
            execute: () => {
                let next = getNextStepBFS(character.x, character.y, null, null, 'river_adjacent');
                if (next) { 
                    character.x = next.x; character.y = next.y; 
                    character.stats.movesInInterval++; 
                    return true; 
                }
                return false; // 실패!
            }
        },
        // [수정] 통합 가방 체크
        '식량파밍': {
            canExecute: () => {
                let t = getTile(character.x, character.y);
                let totalItems = character.stats.inventory.food + character.stats.inventory.water;
                return t.type === 'building' && t.food > 0 && totalItems < character.stats.weightLimit;
            },
            execute: () => { getTile(character.x, character.y).food--; character.stats.inventory.food++; }
        },
        // [추가] 물 파밍
        '물파밍': {
            canExecute: () => {
                let isNearRiver = [[0,1],[0,-1],[1,0],[-1,0]].some(d => getTile(character.x+d[0], character.y+d[1]).type === 'river');
                let totalItems = character.stats.inventory.food + character.stats.inventory.water;
                return isNearRiver && totalItems < character.stats.weightLimit;
            },
            execute: () => { character.stats.inventory.water++; }
        },
        '식사': {
            canExecute: () => character.stats.inventory.food > 0,
            execute: () => { character.stats.inventory.food--; character.stats.hunger = Math.max(0, character.stats.hunger - 8); }
        },
        // [추가] 물 마시기 (갈증 40 감소)
        '물마시기': {
            canExecute: () => character.stats.inventory.water > 0,
            execute: () => { character.stats.inventory.water--; character.stats.thirst = Math.max(0, character.stats.thirst - 40); }
        },
        // [추가] 물 버리기 (가방 공간 비우기용)
        '물 버리기': {
            canExecute: () => character.stats.inventory.water > 0,
            execute: () => { character.stats.inventory.water--; }
        },
        '식량 버리기': {
            canExecute: () => character.stats.inventory.food > 0,
            execute: () => {
                character.stats.inventory.food--;
                getTile(character.x, character.y).droppedFood = (getTile(character.x, character.y).droppedFood || 0) + 1;
            }
        },
        '수면': {
            canExecute: () => getTile(character.x, character.y).type === 'building',
            execute: () => { character.stats.currentState = 'SLEEPING_IN'; character.stats.actionTimer = 10; }
        },
        '노상수면': {
            canExecute: () => getTile(character.x, character.y).type !== 'building',
            execute: () => { character.stats.currentState = 'SLEEPING_OUT'; character.stats.actionTimer = 10; }
        },
        '휴식': {
            canExecute: () => true,
            execute: () => { character.stats.currentState = 'RESTING'; character.stats.actionTimer = 10; }
        },
        '대기': { canExecute: () => true, execute: () => {} },
        '도망치기': { canExecute: () => true, execute: () => { ACTIONS['돌아다니기'].execute(); } },
        '공격': {
            canExecute: () => true,
            execute: () => {
                let target = enemies.find(en => en.x === character.x && en.y === character.y);
                if (target) { target.hp -= character.stats.atk; character.stats.currentState = 'STUNNED'; character.stats.actionTimer = 2; }
            }
        }
    };

// [수정] setTile 함수: 떨어진 식량(droppedFood) 기본값 추가
    function setTile(x, y, type, extraData = {}) {
        if (x >= 0 && x < MAP_SIZE && y >= 0 && y < MAP_SIZE) {
            if (typeof extraData === 'string') {
                mapGrid[y][x] = { type: type, name: extraData, droppedFood: 0 };
            } else {
                mapGrid[y][x] = { type: type, droppedFood: 0, ...extraData };
            }
        }
    }

// [수정] 적군 독립 타이머 (370ms) - 회피 기동 및 공격 로직
    function enemyTick() {
        if (isPaused) return;

        // 사망한 적 제거
        enemies = enemies.filter(en => en.hp > 0);

        enemies.forEach(en => {
            if (en.stun > 0) { en.stun--; return; } // 공격 후 기절 상태

            let dist = Math.abs(en.x - character.x) + Math.abs(en.y - character.y);
            
            // [공격 로직] 캐릭터와 겹쳤고, 캐릭터가 건물 타일 위가 아닐 때!
            if (en.x === character.x && en.y === character.y && getTile(character.x, character.y).type !== 'building') {
                character.stats.hp -= en.atk;
                en.stun = 2; // 적 2턴 기절
                return;
            }

            // [이동 로직] 
            en.moveCounter = (en.moveCounter || 0) + 1;
            
            if (dist <= en.vision) {
                // 3번에 1번은 엉뚱한 방향으로 이동 (자연스러운 동선)
                if (en.moveCounter % 3 === 0) {
                    let dirs = [[0,1], [0,-1], [1,0], [-1,0]].sort(()=> Math.random()-0.5);
                    for(let d of dirs) {
                        let nx = en.x+d[0], ny = en.y+d[1];
                        if (nx>=0 && nx<MAP_SIZE && ny>=0 && ny<MAP_SIZE && getTile(nx, ny).type !== 'river') {
                            en.x = nx; en.y = ny; break;
                        }
                    }
                } else {
                    // 정상 추적
                    let next = getNextStepBFS(en.x, en.y, character.x, character.y);
                    if (next) { en.x = next.x; en.y = next.y; }
                }
            } else {
                let dirs = [[0,1], [0,-1], [1,0], [-1,0]].sort(()=> Math.random()-0.5);
                for (let d of dirs) {
                    let nx = en.x + d[0], ny = en.y + d[1];
                    if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE && getTile(nx, ny).type !== 'river') {
                        en.x = nx; en.y = ny; break;
                    }
                }
            }
        });
        render(); 
    }

// [수정] BFS 목표물 추가 지원 (river_adjacent)
    function getNextStepBFS(startX, startY, targetX, targetY, targetType = null) {
        let queue = [{ x: startX, y: startY, path: [] }];
        let visited = new Set([`${startX},${startY}`]);
        let dirs = [[0,1], [0,-1], [1,0], [-1,0]]; 

        while (queue.length > 0) {
            let curr = queue.shift();
            
            if (targetType) {
                // [핵심 로직] 목표가 '강가'일 경우, 현재 내 타일 주변 1칸에 강이 있는지 검사
                if (targetType === 'river_adjacent') {
                    let isNearRiver = dirs.some(d => getTile(curr.x+d[0], curr.y+d[1]).type === 'river');
                    if (isNearRiver) return curr.path.length > 0 ? curr.path[0] : null;
                } 
                else if (getTile(curr.x, curr.y).type === targetType) {
                    return curr.path.length > 0 ? curr.path[0] : null;
                }
            } else {
                if (curr.x === targetX && curr.y === targetY) return curr.path.length > 0 ? curr.path[0] : null;
            }
            
            if (curr.path.length > 10) continue; 

            for (let d of dirs) {
                let nx = curr.x + d[0], ny = curr.y + d[1];
                if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE) {
                    if (mapGrid[ny][nx].type !== 'river' && !visited.has(`${nx},${ny}`)) {
                        visited.add(`${nx},${ny}`);
                        let step = curr.path.length === 0 ? {x: nx, y: ny} : curr.path[0];
                        queue.push({ x: nx, y: ny, path: [step] });
                    }
                }
            }
        }
        return null; 
    }

    function getTile(x, y) {
        if (x >= 0 && x < MAP_SIZE && y >= 0 && y < MAP_SIZE) return mapGrid[y][x];
        return { type: 'out', name: '' };
    }

    function generateBlobs(type, count, size) {
        for (let i = 0; i < count; i++) {
            let cx = Math.floor(Math.random() * MAP_SIZE), cy = Math.floor(Math.random() * MAP_SIZE);
            if (type === 'mountain') {
                cx = Math.random() < 0.5 ? Math.floor(Math.random() * 15) : MAP_SIZE - 1 - Math.floor(Math.random() * 15);
                cy = Math.random() < 0.5 ? Math.floor(Math.random() * 15) : MAP_SIZE - 1 - Math.floor(Math.random() * 15);
            }
            let queue = [{x: cx, y: cy}], tilesPlaced = 0;
            while (queue.length > 0 && tilesPlaced < size) {
                let curr = queue.shift();
                if (getTile(curr.x, curr.y).type === 'empty') {
                    setTile(curr.x, curr.y, type); tilesPlaced++;
                    let dirs = [[0,1], [0,-1], [1,0], [-1,0]].sort(() => Math.random() - 0.5);
                    for (let d of dirs) if (Math.random() < 0.7) queue.push({x: curr.x + d[0], y: curr.y + d[1]});
                }
            }
        }
    }

function generateRiver() {
        let edge = Math.floor(Math.random() * 4); // 0:북, 1:남, 2:서, 3:동
        let x, y, dx = 0, dy = 0;
        
        // 맵 길이의 50% ~ 75% 정도만 흐르다 끊기게 설정 (단절 방지)
        let maxLength = Math.floor(MAP_SIZE * (0.5 + Math.random() * 0.25)); 

        // 상하좌우 중 출발점 및 방향 설정
        if (edge === 0) { x = 20 + Math.floor(Math.random() * (MAP_SIZE - 40)); y = 0; dy = 1; }
        else if (edge === 1) { x = 20 + Math.floor(Math.random() * (MAP_SIZE - 40)); y = MAP_SIZE - 1; dy = -1; }
        else if (edge === 2) { x = 0; y = 20 + Math.floor(Math.random() * (MAP_SIZE - 40)); dx = 1; }
        else if (edge === 3) { x = MAP_SIZE - 1; y = 20 + Math.floor(Math.random() * (MAP_SIZE - 40)); dx = -1; }

        for (let i = 0; i < maxLength; i++) {
            setTile(x, y, 'river');
            if (dx === 0) setTile(x+1, y, 'river'); // 수직 강 폭
            else setTile(x, y+1, 'river'); // 수평 강 폭

            x += dx; y += dy;
            
            // 취객의 걸음 (비틀거리기)
            let rand = Math.random();
            if (dx === 0) { // 수직 이동 중 좌우 비틀기
                if (rand < 0.3) x--; else if (rand > 0.7) x++;
            } else { // 수평 이동 중 상하 비틀기
                if (rand < 0.3) y--; else if (rand > 0.7) y++;
            }
            
            // 맵 밖으로 나가버리면 중단
            if (x < 0 || x >= MAP_SIZE || y < 0 || y >= MAP_SIZE) break;
        }
    }

// [수정된 방사형 도로망 생성기]
    function generateRoads(startX, startY, branches) {
        let queue = [];
        
        // 1. 중앙에서 뻗어나가는 굵은 간선 도로 (수명 30)
        for(let i = 0; i < branches; i++) {
            let angle = (i * (Math.PI * 2) / branches) + (Math.random() * 0.5);
            queue.push({ x: startX, y: startY, dx: Math.cos(angle), dy: Math.sin(angle), life: 30 });
        }

        while(queue.length > 0) {
            let curr = queue.shift();
            let cx = curr.x, cy = curr.y;

            for(let step = 0; step < curr.life; step++) {
                cx += curr.dx; 
                cy += curr.dy;
                let rx = Math.floor(cx), ry = Math.floor(cy);
                
                // 산이나 강을 만나면 도로 건설 중단
                if (getTile(rx, ry).type === 'mountain' || getTile(rx, ry).type === 'river') break;
                
                setTile(rx, ry, 'road');
                
                // 2. [핵심 수정] 잔가지를 칠 때, 부모 수명의 절반만 물려줌 (무한 증식 방지)
                if (Math.random() < 0.1 && curr.life > 10) {
                    let newAngle = Math.random() * Math.PI * 2;
                    let childLife = Math.floor(curr.life / 2); // 15, 7, 3... 으로 점점 줄어듦
                    queue.push({ x: rx, y: ry, dx: Math.cos(newAngle), dy: Math.sin(newAngle), life: childLife });
                }
            }
        }
    }

    function rotatePrefab(prefab) { return prefab.map(p => [-p[1], p[0]]); }

// [수정] 건물 배치 시 자원(식량, 취침)을 계산해서 타일에 심어두기
    function generateBuildings() {
        const bTypes = Object.keys(PREFABS);
        
        for (let i = 0; i < 400; i++) { 
            let rx = Math.floor(Math.random() * MAP_SIZE);
            let ry = Math.floor(Math.random() * MAP_SIZE);
            
            let isNearRoad = [[0,1],[0,-1],[1,0],[-1,0]].some(d => getTile(rx+d[0], ry+d[1]).type === 'road');
            let requireRoad = (i % 2 === 0);
            
            if (requireRoad && !isNearRoad) continue; 
            if (!requireRoad && isNearRoad) continue; 

            let bName = bTypes[Math.floor(Math.random() * bTypes.length)];
            let prefab = PREFABS[bName];
            for(let r=0; r<Math.floor(Math.random() * 4); r++) prefab = rotatePrefab(prefab);

            let canPlace = true;
            for (let p of prefab) { 
                let tx = rx + p[0], ty = ry + p[1];
                if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE || getTile(tx, ty).type !== 'empty') { 
                    canPlace = false; break; 
                } 
            }

            if (canPlace) {
                // 건물을 지을 때 타일마다 자원을 계산해서 넣는 내부 함수
                const placeBuildingTile = (bx, by, bName, isFirstTile) => {
                    let resConfig = BUILDING_RESOURCES[bName] || { food: [0,0], sleep: 0 };
                    // 지정된 최소~최대 식량 사이에서 무작위 값 추출
                    let foodAmount = Math.floor(Math.random() * (resConfig.food[1] - resConfig.food[0] + 1)) + resConfig.food[0];
                    
                    setTile(bx, by, 'building', {
                        name: isFirstTile ? bName : '', // 첫 타일에만 이름 표시용
                        bName: bName, // 실제 건물 종류
                        food: foodAmount,
                        sleep: resConfig.sleep
                    });
                };

                for (let j = 0; j < prefab.length; j++) {
                    placeBuildingTile(rx + prefab[j][0], ry + prefab[j][1], bName, j === 0);
                }
                
                if (bName === '아파트' && Math.random() < 0.7) {
                    let shiftX = Math.random() < 0.5 ? 3 : -3, canPlace2 = true;
                    for (let p of prefab) {
                        let tx = rx+shiftX+p[0], ty = ry+p[1];
                        if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE || getTile(tx, ty).type !== 'empty') canPlace2 = false;
                    }
                    if (canPlace2) {
                        for (let j = 0; j < prefab.length; j++) {
                            placeBuildingTile(rx + shiftX + prefab[j][0], ry + prefab[j][1], bName, j === 0);
                        }
                    }
                }
            }
        }
    }

// [수정] UI 업데이트 로직 (상태 텍스트 추가)
    function updateStatusUI() {
        document.getElementById('stat-hp').innerText = character.stats.hp;
        document.getElementById('stat-atk').innerText = character.stats.atk;
        document.getElementById('stat-hunger').innerText = character.stats.hunger;
        document.getElementById('stat-thirst').innerText = character.stats.thirst; // 추가
        document.getElementById('stat-fatigue').innerText = character.stats.fatigue;
        
        let totalItems = character.stats.inventory.food + character.stats.inventory.water;
        document.getElementById('stat-bag').innerText = totalItems;

        // [추가] 부여된 특성 이름 가져오기
        let traitName = character.stats.traits.length > 0 ? character.stats.traits[0].name : '없음';

        const stateKo = { 'IDLE': '대기', 'SLEEPING_IN': '수면', 'SLEEPING_OUT': '노상수면', 'RESTING': '휴식', 'STUNNED': '기절' };
        let currentAction = '행동 중';
        if (character.stats.hp <= 0) currentAction = '사망 ☠️';
        else if (character.stats.actionTimer > 0) currentAction = stateKo[character.stats.currentState] || '행동 중';
        else currentAction = '돌아다니기';

        // [수정] 상태 표시 형식: 🥰 트윈테일 [상태: 돌아다니기] [특성: 미소녀]
        document.getElementById('status-title').innerText = `🥰 트윈테일 [상태: ${currentAction}] [특성: ${traitName}]`;
    }

    function render() {
        for (let y = 0; y < VIEW_SIZE; y++) {
            for (let x = 0; x < VIEW_SIZE; x++) {
                let mx = camera.x + x;
                let my = camera.y + y;
                
                let el = document.getElementById(`tile-${x}-${y}`);
                el.className = 'tile';
                el.innerHTML = '';
                
                // [추가] 매 프레임마다 이전 테두리 찌꺼기 초기화
                el.style.borderTop = '';
                el.style.borderBottom = '';
                el.style.borderLeft = '';
                el.style.borderRight = '';

                let cell = getTile(mx, my);
                el.classList.add(`tile-${cell.type}`);
                
                if (cell.type === 'building') {
                    if (cell.name) el.innerText = cell.name.substring(0, 2);
                    
                    // [핵심 로직] 상하좌우 타일을 검사하여, '나와 다른 종류의 건물'이거나 '빈 땅/도로'일 때만 진한 외곽선을 칠함
                    if (getTile(mx, my - 1).bName !== cell.bName) el.style.borderTop = '2px solid rgba(0,0,0,0.8)';
                    if (getTile(mx, my + 1).bName !== cell.bName) el.style.borderBottom = '2px solid rgba(0,0,0,0.8)';
                    if (getTile(mx - 1, my).bName !== cell.bName) el.style.borderLeft = '2px solid rgba(0,0,0,0.8)';
                    if (getTile(mx + 1, my).bName !== cell.bName) el.style.borderRight = '2px solid rgba(0,0,0,0.8)';
                }
                
                // 적 렌더링
                let enemyInCell = enemies.find(en => en.x === mx && en.y === my);
                if (enemyInCell) {
                    el.innerHTML += `<span class="char" style="z-index:15;">👹</span>`;
                }
                
                // 땅에 떨어진 식량 렌더링 (1/4 크기)
                if (cell.droppedFood > 0) {
                    el.innerHTML += `<span class="dropped-food">🍖</span>`;
                }

                // 캐릭터 렌더링 (적보다 위에 그려짐)
                if (character.x === mx && character.y === my) {
                    let displayEmoji = character.stats.hp <= 0 ? '☠️' : character.emoji;
                    // 🚨 수정됨: ${character.emoji} 대신 ${displayEmoji}를 출력하도록 변경
                    el.innerHTML += `<span class="char" style="z-index:20;">${displayEmoji}</span>`;
                }
            }
        }
    }

</script>
</body>
</html>
